version: '3.8'

# ============================================
# HRMS Pro - Consolidated Monolith Deployment
# ============================================
# Usage: docker compose -f docker-compose.monolith.yml up -d
# ============================================

networks:
  hrms-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

services:
  # ============================================
  # INFRASTRUCTURE
  # ============================================

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hrms}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      TZ: ${TZ:-UTC}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - hrms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis-data:/data
    networks:
      - hrms-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # CONSOLIDATED API (All 20 modules)
  # ============================================

  hrms-api:
    build:
      context: .
      dockerfile: src/Api/HRMS.Api/Dockerfile
      args:
        - BUILD_CONFIGURATION=Release
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-hrms};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      Jwt__SecretKey: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set}
      Jwt__Issuer: ${JWT_ISSUER:-HRMS-Pro}
      Jwt__Audience: ${JWT_AUDIENCE:-HRMS-Pro-Users}
      Jwt__ExpiryMinutes: ${JWT_EXPIRY_MINUTES:-60}
      Redis__ConnectionString: redis:${REDIS_PASSWORD}@redis:6379
      Cors__AllowedOrigins__0: ${FRONTEND_URL:-http://localhost:4200}
      SMTP__Host: ${SMTP_HOST:-smtp.gmail.com}
      SMTP__Port: ${SMTP_PORT:-587}
      SMTP__Username: ${SMTP_USERNAME:-}
      SMTP__Password: ${SMTP_PASSWORD:-}
      SMTP__FromEmail: ${SMTP_FROM_EMAIL:-hrms@example.com}
      SMTP__EnableSsl: ${SMTP_ENABLE_SSL:-true}
      Serilog__MinimumLevel__Default: ${LOG_LEVEL:-Information}
      TZ: ${TZ:-UTC}
    networks:
      - hrms-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # ============================================
  # FRONTEND (Angular SPA via Nginx)
  # ============================================

  frontend:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "4200:80"
    environment:
      NODE_ENV: production
      API_BASE_URL: http://hrms-api:8080
      TZ: ${TZ:-UTC}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - hrms-network
    depends_on:
      hrms-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
