name: CodeQL Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6:00 AM UTC
    - cron: '0 18 * * 4'  # Every Thursday at 6:00 PM UTC

jobs:
  # ============================================
  # JavaScript/TypeScript Analysis
  # ============================================
  javascript:
    name: JavaScript/TypeScript Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'typescript']
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config: |
            paths:
              - frontend/src
            queries:
              - uses: security-extended
              - uses: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ============================================
  # C# Analysis
  # ============================================
  csharp:
    name: C# Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          config: |
            paths:
              - src
            queries:
              - uses: security-extended
              - uses: security-and-quality

      - name: Build .NET solution
        run: |
          dotnet restore
          dotnet build --configuration Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"

  # ============================================
  # Dockerfile Analysis
  # ============================================
  dockerfile:
    name: Dockerfile Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: dockerfile
          config: |
            paths:
              - '**/Dockerfile'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:dockerfile"

  # ============================================
  # Configuration Files Analysis
  # ============================================
  configuration:
    name: Configuration Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: yaml
          config: |
            paths:
              - docker-compose*.yml
              - .github/workflows/*.yml
              - nginx/*.conf

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:yaml"

  # ============================================
  # Dependency Review
  # ============================================
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
          comment-summary-in-pr: always

  # ============================================
  # Secret Scanning
  # ============================================
  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ============================================
  # Upload SARIF Results
  # ============================================
  upload-sarif:
    name: Upload SARIF Results
    runs-on: ubuntu-latest
    needs: [javascript, csharp, dockerfile, configuration]
    if: always()
    permissions:
      security-events: write
    
    steps:
      - name: Download SARIF files
        uses: actions/download-artifact@v4
        with:
          pattern: sarif-*
          merge-multiple: true
          path: sarif-files

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sarif-files
          category: codeql-results