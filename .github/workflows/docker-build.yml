name: Build and Push Docker Images

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/hrms

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: api-gateway
            context: .
            dockerfile: ./src/ApiGateway/HRMS.ApiGateway/Dockerfile
          - name: identity
            context: .
            dockerfile: ./src/Services/Identity/HRMS.Services.Identity.API/Dockerfile
          - name: organization
            context: .
            dockerfile: ./src/Services/Organization/HRMS.Services.Organization.API/Dockerfile
          - name: employee
            context: .
            dockerfile: ./src/Services/Employee/Dockerfile
          - name: attendance
            context: .
            dockerfile: ./src/Services/Attendance/Dockerfile
          - name: leave
            context: .
            dockerfile: ./src/Services/Leave/API/Dockerfile
          - name: payroll
            context: .
            dockerfile: ./src/Services/Payroll/HRMS.Services.Payroll.API/Dockerfile
          - name: notification
            context: .
            dockerfile: ./src/Services/Notification/Dockerfile
          - name: recruitment
            context: .
            dockerfile: ./src/Services/Recruitment/Dockerfile
          - name: projecttask
            context: .
            dockerfile: ./src/Services/ProjectTask/Dockerfile
          - name: performance
            context: .
            dockerfile: ./src/Services/Performance/Dockerfile
          - name: training
            context: .
            dockerfile: ./src/Services/Training/Dockerfile
          - name: audit
            context: .
            dockerfile: ./src/Services/Audit/Dockerfile
          - name: report
            context: .
            dockerfile: ./src/Services/Report/Dockerfile
          - name: dashboard
            context: .
            dockerfile: ./src/Services/Dashboard/Dockerfile
          - name: expense
            context: .
            dockerfile: ./src/Services/Expense/Dockerfile
          - name: travel
            context: .
            dockerfile: ./src/Services/Travel/Dockerfile
          - name: helpdesk
            context: .
            dockerfile: ./src/Services/Helpdesk/Dockerfile
          - name: chat
            context: .
            dockerfile: ./src/Services/Chat/Dockerfile
          - name: document
            context: .
            dockerfile: ./src/Services/Document/Dockerfile
          - name: workflow
            context: .
            dockerfile: ./src/Services/Workflow/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ github.sha }}
            API_BASE_URL=${{ vars.API_BASE_URL }}
