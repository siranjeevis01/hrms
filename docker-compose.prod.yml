      args:
        - BUILD_VERSION=${BUILD_VERSION}
        - API_BASE_URL=${API_BASE_URL}
    restart: always
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    environment:
      NODE_ENV: production
      API_BASE_URL: ${API_BASE_URL}
