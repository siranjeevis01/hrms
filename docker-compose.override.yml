version: '3.8'

# Development overrides - use with: docker-compose -f docker-compose.yml -f docker-compose.override.yml up

services:
  mysql:
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Root@123456
      MYSQL_DATABASE: hrms_identity
      MYSQL_USER: hrms_admin
      MYSQL_PASSWORD: Hrms@123456
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
      - ./docker/mysql/conf.d:/etc/mysql/conf.d
    command: --default-authentication-plugin=mysql_native_password

  redis:
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass Redis@123456

  rabbitmq:
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: hrms_rabbitmq
      RABBITMQ_DEFAULT_PASS: Rabbit@123456
      RABBITMQ_DEFAULT_VHOST: hrms_vhost

  elasticsearch:
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - bootstrap.memory_lock=true

  kibana:
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

  jaeger:
    ports:
      - "16686:16686"
      - "14268:14268"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      LOG_LEVEL: debug

  api-gateway:
    build:
      context: .
      dockerfile: src/ApiGateway/Dockerfile
      target: build
    ports:
      - "5000:8080"
      - "5001:5001"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DOTNET_EnableDiagnostics: "1"
      DOTNET_ENVIRONMENT: Development
      JWT_SECRET_KEY: DevSuperSecretKeyForDevelopmentOnly32Chars!
      JWT_ISSUER: HRMS-Pro-Dev
      JWT_AUDIENCE: HRMS-Pro-Dev-Users
      JWT_EXPIRY_MINUTES: "1440"
      IdentityService__BaseUrl: http://identity-service:8080
      OrganizationService__BaseUrl: http://organization-service:8080
      EmployeeService__BaseUrl: http://employee-service:8080
      AttendanceService__BaseUrl: http://attendance-service:8080
      LeaveService__BaseUrl: http://leave-service:8080
      PayrollService__BaseUrl: http://payroll-service:8080
      NotificationService__BaseUrl: http://notification-service:8080
      RecruitmentService__BaseUrl: http://recruitment-service:8080
      ProjectTaskService__BaseUrl: http://projecttask-service:8080
      PerformanceService__BaseUrl: http://performance-service:8080
      TrainingService__BaseUrl: http://training-service:8080
      AuditService__BaseUrl: http://audit-service:8080
      ReportService__BaseUrl: http://report-service:8080
      DashboardService__BaseUrl: http://dashboard-service:8080
      ExpenseService__BaseUrl: http://expense-service:8080
      TravelService__BaseUrl: http://travel-service:8080
      HelpdeskService__BaseUrl: http://helpdesk-service:8080
      ChatService__BaseUrl: http://chat-service:8080
      DocumentService__BaseUrl: http://document-service:8080
      WorkflowService__BaseUrl: http://workflow-service:8080
      Redis__ConnectionString: redis:6379,password=Redis@123456
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__UserName: hrms_rabbitmq
      RabbitMQ__Password: Rabbit@123456
      RabbitMQ__VirtualHost: hrms_vhost
      OpenTelemetry__ServiceName: hrms-api-gateway
      OpenTelemetry__Endpoint: http://jaeger:4317
      Serilog__MinimumLevel__Default: Debug
      Serilog__MinimumLevel__Override__Microsoft: Warning
      Serilog__MinimumLevel__Override__System: Warning
    volumes:
      - ./src/ApiGateway:/app
      - ~/.nuget/packages:/root/.nuget/packages
      - ./logs/api-gateway:/app/logs
    networks:
      - hrms-network

  identity-service:
    build:
      context: .
      dockerfile: src/Services/Identity/Dockerfile
      target: build
    ports:
      - "5001:8080"
      - "5011:5001"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DOTNET_EnableDiagnostics: "1"
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Server=mysql;Port=3306;Database=hrms_identity;User=hrms_admin;Password=Hrms@123456;SslMode=None;
      Jwt__SecretKey: DevSuperSecretKeyForDevelopmentOnly32Chars!
      Jwt__Issuer: HRMS-Pro-Dev
      Jwt__Audience: HRMS-Pro-Dev-Users
      Jwt__ExpiryMinutes: "1440"
      Redis__ConnectionString: redis:6379,password=Redis@123456
      RabbitMQ__HostName: rabbitmq
