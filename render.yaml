services:
  - type: web
    name: hrms-api
    runtime: dotnet
    plan: free
    rootDir: .
    buildCommand: dotnet publish src/Api/HRMS.Api/HRMS.Api.csproj -c Release -o ./publish
    startCommand: dotnet ./publish/HRMS.Api.dll
    healthCheckPath: /health/live
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: hrms-db
          property: connectionString
      - key: Redis__ConnectionString
        sync: false
      - key: Cors__AllowedOrigins
        value: '["https://hrms-siranjeevis01.web.app","https://hrms-siranjeevis01.firebaseapp.com","http://localhost:4200"]'
      - key: Jwt__SecretKey
        generateValue: true
      - key: Jwt__Issuer
        value: HRMS-Pro
      - key: Jwt__Audience
        value: hrms-api
      - key: Jwt__ExpirationMinutes
        value: 60

  - type: pgsql
    name: hrms-db
    plan: free
    database: hrms
    user: hrms_admin

  - type: static_site
    name: hrms-frontend
    plan: free
    rootDir: frontend
    buildCommand: npm install && npx ng build --configuration=production
    staticPublishPath: dist/frontend/browser
    routes:
      - type: rewrite
        source: /api/*
        destination: https://hrms-api.onrender.com/api/*
      - type: rewrite
        source: /hubs/*
        destination: https://hrms-api.onrender.com/hubs/*
      - type: rewrite
        source: /*
        destination: /index.html
