version: '3.8'

networks:
  hrms-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local
  es-data:
    driver: local

services:
  # ============================================
  # INFRASTRUCTURE SERVICES
  # ============================================
  
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Root@123456}
      MYSQL_DATABASE: hrms_identity
      MYSQL_USER: ${MYSQL_USER:-hrms_admin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Hrms@123456}
      TZ: ${TZ:-UTC}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
      - ./docker/mysql/conf.d:/etc/mysql/conf.d
    networks:
      - hrms-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-Root@123456}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-Redis@123456}
    volumes:
      - redis-data:/data
    networks:
      - hrms-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-Redis@123456}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-hrms_rabbitmq}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-Rabbit@123456}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-hrms_vhost}
      TZ: ${TZ:-UTC}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    networks:
      - hrms-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    restart: unless-stopped
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms512m -Xmx512m}
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - cluster.name=hrms-cluster
      - node.name=hrms-node-1
      - bootstrap.memory_lock=true
      - TZ=${TZ:-UTC}
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - hrms-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      ELASTICSEARCH_USERNAME: ${ELASTICSEARCH_USERNAME:-elastic}
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD:-changeme}
      TZ: ${TZ:-UTC}
    networks:
      - hrms-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  jaeger:
    image: jaegertracing/all-in-one:1.50
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "14268:14268"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TZ: ${TZ:-UTC}
    networks:
      - hrms-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:16686/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  # ============================================
  # BACKEND MICROSERVICES
  # ============================================

  api-gateway:
    build:
      context: .
      dockerfile: src/ApiGateway/HRMS.ApiGateway/Dockerfile
      args:
        - BUILD_VERSION=${BUILD_VERSION:-1.0.0}
        - BUILD_DATE=${BUILD_DATE:-1.0.0}
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-YourSuperSecretKeyHereMustBeAtLeast32Characters!}
      JWT_ISSUER: ${JWT_ISSUER:-HRMS-Pro}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-HRMS-Pro-Users}
      JWT_EXPIRY_MINUTES: ${JWT_EXPIRY_MINUTES:-60}
      IdentityService__BaseUrl: http://identity-service:8080
      OrganizationService__BaseUrl: http://organization-service:8080
      EmployeeService__BaseUrl: http://employee-service:8080
      AttendanceService__BaseUrl: http://attendance-service:8080
      LeaveService__BaseUrl: http://leave-service:8080
      PayrollService__BaseUrl: http://payroll-service:8080
      NotificationService__BaseUrl: http://notification-service:8080
      RecruitmentService__BaseUrl: http://recruitment-service:8080
      ProjectTaskService__BaseUrl: http://projecttask-service:8080
      PerformanceService__BaseUrl: http://performance-service:8080
      TrainingService__BaseUrl: http://training-service:8080
      AuditService__BaseUrl: http://audit-service:8080
      ReportService__BaseUrl: http://report-service:8080
      DashboardService__BaseUrl: http://dashboard-service:8080
      ExpenseService__BaseUrl: http://expense-service:8080
      TravelService__BaseUrl: http://travel-service:8080
      HelpdeskService__BaseUrl: http://helpdesk-service:8080
      ChatService__BaseUrl: http://chat-service:8080
      DocumentService__BaseUrl: http://document-service:8080
      WorkflowService__BaseUrl: http://workflow-service:8080
      Redis__ConnectionString: redis:6379,password=${REDIS_PASSWORD:-Redis@123456}
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: ${RABBITMQ_USER:-hrms_rabbitmq}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD:-Rabbit@123456}
      RabbitMQ__VirtualHost: ${RABBITMQ_VHOST:-hrms_vhost}
      OpenTelemetry__ServiceName: hrms-api-gateway
      OpenTelemetry__Endpoint: http://jaeger:4317
      Serilog__MinimumLevel__Default: ${LOG_LEVEL:-Information}
      TZ: ${TZ:-UTC}
    volumes:
      - ./logs/api-gateway:/app/logs
    networks:
      - hrms-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

