<div class="p-6 max-w-4xl mx-auto space-y-6">
  <h1 class="text-2xl font-bold text-gray-900">Company Settings</h1>
  @if (loading()) {
    <div class="flex justify-center py-12"><mat-spinner diameter="48"></mat-spinner></div>
  } @else {
    <mat-card>
      <mat-card-content class="p-6">
        <form [formGroup]="settingsForm" class="space-y-6">
          <h3 class="font-semibold text-gray-900">Company Information</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <mat-form-field appearance="outline" class="w-full"><mat-label>Company Name</mat-label><input matInput formControlName="name" /></mat-form-field>
            <mat-form-field appearance="outline" class="w-full"><mat-label>Email</mat-label><input matInput formControlName="email" type="email" /></mat-form-field>
            <mat-form-field appearance="outline" class="w-full"><mat-label>Phone</mat-label><input matInput formControlName="phone" /></mat-form-field>
            <mat-form-field appearance="outline" class="w-full"><mat-label>Website</mat-label><input matInput formControlName="website" /></mat-form-field>
          </div>
          <mat-form-field appearance="outline" class="w-full"><mat-label>Address</mat-label><textarea matInput formControlName="address" rows="2"></textarea></mat-form-field>
          <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <mat-form-field appearance="outline" class="w-full"><mat-label>City</mat-label><input matInput formControlName="city" /></mat-form-field>
            <mat-form-field appearance="outline" class="w-full"><mat-label>State</mat-label><input matInput formControlName="state" /></mat-form-field>
            <mat-form-field appearance="outline" class="w-full"><mat-label>Country</mat-label><input matInput formControlName="country" /></mat-form-field>
            <mat-form-field appearance="outline" class="w-full"><mat-label>Postal Code</mat-label><input matInput formControlName="postalCode" /></mat-form-field>
          </div>
          <h3 class="font-semibold text-gray-900 pt-4 border-t">Preferences</h3>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <mat-form-field appearance="outline" class="w-full"><mat-label>Currency</mat-label><mat-select formControlName="currency"><mat-option value="USD">USD</mat-option><mat-option value="EUR">EUR</mat-option><mat-option value="GBP">GBP</mat-option><mat-option value="INR">INR</mat-option></mat-select></mat-form-field>
            <mat-form-field appearance="outline" class="w-full"><mat-label>Timezone</mat-label><mat-select formControlName="timezone"><mat-option value="UTC">UTC</mat-option><mat-option value="EST">EST</mat-option><mat-option value="PST">PST</mat-option><mat-option value="IST">IST</mat-option></mat-select></mat-form-field>
            <mat-form-field appearance="outline" class="w-full"><mat-label>Date Format</mat-label><mat-select formControlName="dateFormat"><mat-option value="MM/dd/yyyy">MM/DD/YYYY</mat-option><mat-option value="dd/MM/yyyy">DD/MM/YYYY</mat-option><mat-option value="yyyy-MM-dd">YYYY-MM-DD</mat-option></mat-select></mat-form-field>
          </div>
          <div class="flex justify-end pt-4">
            <button mat-raised-button color="primary" (click)="save()" [disabled]="saving()">
              @if (saving()) { <mat-spinner diameter="20" class="inline-block"></mat-spinner> } @else { Save Changes }
            </button>
          </div>
        </form>
      </mat-card-content>
    </mat-card>
  }
</div>
