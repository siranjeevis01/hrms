<div class="p-6 space-y-6">
  <div class="flex items-center justify-between"><h1 class="text-2xl font-bold text-gray-900">Designations</h1><button mat-raised-button color="primary"><mat-icon>add</mat-icon> Add Designation</button></div>
  @if (loading()) { <div class="flex justify-center py-12"><p class="text-gray-500">Loading...</p></div> }
  @else {
    <mat-card>
      <table mat-table [dataSource]="designations()" class="w-full">
        <ng-container matColumnDef="name"><th mat-header-cell *matHeaderCellDef>Name</th><td mat-cell *matCellDef="let d" class="font-medium">{{ d.name }}</td></ng-container>
        <ng-container matColumnDef="level"><th mat-header-cell *matHeaderCellDef>Level</th><td mat-cell *matCellDef="let d">{{ d.level }}</td></ng-container>
        <ng-container matColumnDef="department"><th mat-header-cell *matHeaderCellDef>Department</th><td mat-cell *matCellDef="let d">{{ d.departmentName }}</td></ng-container>
        <ng-container matColumnDef="employeeCount"><th mat-header-cell *matHeaderCellDef>Employees</th><td mat-cell *matCellDef="let d">{{ d.employeeCount }}</td></ng-container>
        <ng-container matColumnDef="salary"><th mat-header-cell *matHeaderCellDef>Salary Range</th><td mat-cell *matCellDef="let d" class="text-sm">${{ d.minSalary | number }} - ${{ d.maxSalary | number }}</td></ng-container>
        <ng-container matColumnDef="actions"><th mat-header-cell *matHeaderCellDef></th><td mat-cell *matCellDef="let d"><button mat-icon-button><mat-icon>edit</mat-icon></button></td></ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover:bg-gray-50"></tr>
      </table>
    </mat-card>
  }
</div>
