<div class="p-6 space-y-6">
  <div class="flex items-center justify-between"><h1 class="text-2xl font-bold text-gray-900">Feature Flags</h1><button mat-raised-button color="primary"><mat-icon>add</mat-icon> Create Flag</button></div>
  @if (loading()) { <div class="flex justify-center py-12"><p class="text-gray-500">Loading...</p></div> }
  @else if (flags().length === 0) {
    <div class="text-center py-16 bg-white rounded-lg border"><mat-icon class="text-gray-400 text-6xl">flag</mat-icon><p class="mt-4 text-gray-600">No feature flags configured</p></div>
  } @else {
    <div class="space-y-3">
      @for (flag of flags(); track flag.id) {
        <mat-card class="p-5">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-4">
              <mat-slide-toggle [checked]="flag.isEnabled" (change)="toggleFlag(flag)"></mat-slide-toggle>
              <div>
                <div class="flex items-center gap-2">
                  <h3 class="font-semibold text-gray-900">{{ flag.name }}</h3>
                  <code class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded">{{ flag.key }}</code>
                </div>
                <p class="text-sm text-gray-500 mt-1">{{ flag.description }}</p>
                <div class="flex items-center gap-2 mt-2">
                  <span class="px-2 py-0.5 rounded text-xs bg-gray-100 text-gray-600">{{ flag.environment }}</span>
                  <span class="text-xs text-gray-400">{{ flag.percentage }}% rollout</span>
                </div>
              </div>
            </div>
          </div>
        </mat-card>
      }
    </div>
  }
</div>
