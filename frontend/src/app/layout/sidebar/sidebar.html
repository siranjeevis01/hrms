<div class="sidebar">
  <div class="sidebar__logo">
    <div class="sidebar__logo-icon">
      <mat-icon>business</mat-icon>
    </div>
    <div class="sidebar__logo-text">
      <span class="sidebar__logo-name">HRMS Pro</span>
      <span class="sidebar__logo-tagline">Enterprise Suite</span>
    </div>
  </div>

  <nav class="sidebar__nav">
    @for (category of categories; track category.label) {
      <div class="sidebar__category">
        <button
          class="sidebar__category-header"
          (click)="toggleCategory(category.label)"
          [attr.aria-expanded]="isCategoryExpanded(category.label)">
          <mat-icon class="sidebar__category-icon">{{ category.icon }}</mat-icon>
          <span class="sidebar__category-label">{{ category.label }}</span>
          <mat-icon
            class="sidebar__category-arrow"
            [class.rotated]="isCategoryExpanded(category.label)">
            expand_more
          </mat-icon>
        </button>

        @if (isCategoryExpanded(category.label)) {
          <div class="sidebar__items">
            @for (item of category.items; track item.route) {
              <a
                class="sidebar__item"
                [routerLink]="item.route"
                routerLinkActive="sidebar__item--active"
                [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
                (click)="closeSidebar.emit()"
                [matTooltip]="item.label"
                matTooltipPosition="right">
                <mat-icon class="sidebar__item-icon">{{ item.icon }}</mat-icon>
                <span class="sidebar__item-label">{{ item.label }}</span>
              </a>
            }
          </div>
        }
      </div>
    }
  </nav>
</div>
